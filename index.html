<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STEAM Quest – Learn Through Play</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --S: #FF6B6B; --T: #4ECDC4; --E: #F7DC6F; --A: #C39BD3; --M: #82E0AA; --ST: #F0A500;
    --bg: #0D1B2A; --card: #16293D; --text: #F0F4FF; --sub: #8BA5C0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background-image: radial-gradient(circle at 20% 20%, #1a3a5c 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, #1a2a40 0%, transparent 50%);
  }

  h1.title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 5vw, 3.5rem);
    text-align: center;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #FF6B6B, #F7DC6F, #4ECDC4, #C39BD3, #82E0AA);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    padding: 1.5rem 1rem 0.5rem;
    filter: drop-shadow(0 0 20px rgba(255,200,100,0.3));
  }

  .subtitle {
    text-align: center; color: var(--sub); font-size: 1rem; margin-bottom: 2rem; letter-spacing: 1px;
  }

  /* ---- SCREENS ---- */
  .screen { display: none; flex-direction: column; align-items: center; padding: 1rem 1.5rem 3rem; }
  .screen.active { display: flex; }

  /* ---- DIE ---- */
  .die-arena {
    perspective: 800px;
    margin: 1.5rem auto;
  }

  .die {
    width: 140px; height: 140px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    cursor: pointer;
  }

  .die.rolling {
    animation: dieRoll 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }

  @keyframes dieRoll {
    0%   { transform: rotateX(0) rotateY(0) rotateZ(0); }
    25%  { transform: rotateX(360deg) rotateY(180deg) rotateZ(90deg); }
    50%  { transform: rotateX(180deg) rotateY(540deg) rotateZ(180deg); }
    75%  { transform: rotateX(540deg) rotateY(360deg) rotateZ(270deg); }
    100% { transform: var(--final-rot, rotateX(0deg) rotateY(0deg)); }
  }

  .face {
    position: absolute; width: 140px; height: 140px;
    border-radius: 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    backface-visibility: hidden;
    border: 3px solid rgba(255,255,255,0.15);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
  }

  .face span.label { font-size: 0.75rem; font-family: 'Nunito', sans-serif; font-weight: 800; letter-spacing: 1px; opacity: 0.85; margin-top: 4px; }

  .face-front  { background: var(--S); transform: translateZ(70px); }
  .face-back   { background: var(--T); transform: rotateY(180deg) translateZ(70px); }
  .face-right  { background: var(--E); transform: rotateY(90deg) translateZ(70px); }
  .face-left   { background: var(--A); transform: rotateY(-90deg) translateZ(70px); }
  .face-top    { background: var(--M); transform: rotateX(90deg) translateZ(70px); }
  .face-bottom { background: var(--ST); transform: rotateX(-90deg) translateZ(70px); }

  .btn-roll {
    margin-top: 2rem;
    padding: 1rem 3rem;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    border: none; border-radius: 50px;
    background: linear-gradient(135deg, #FF6B6B, #F0A500);
    color: white;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 8px 25px rgba(255,107,107,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-roll:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255,107,107,0.5); }
  .btn-roll:active { transform: translateY(0); }
  .btn-roll:disabled { opacity: 0.5; cursor: not-allowed; }

  .result-banner {
    margin-top: 1.5rem;
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    text-align: center;
    opacity: 0; transition: opacity 0.5s;
    min-height: 2.5rem;
  }
  .result-banner.show { opacity: 1; }

  /* ---- QUESTION CARD ---- */
  .q-header {
    display: flex; align-items: center; gap: 1rem;
    width: 100%; max-width: 680px;
    margin-bottom: 1.5rem;
  }

  .subject-badge {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem; padding: 0.4rem 1.2rem;
    border-radius: 50px; color: #0D1B2A;
    letter-spacing: 1px;
  }

  .level-tag {
    font-size: 0.8rem; font-weight: 700; color: var(--sub);
    letter-spacing: 1px; text-transform: uppercase;
  }

  .score-display {
    margin-left: auto;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
  }

  .q-card {
    background: var(--card);
    border-radius: 24px;
    padding: 2rem;
    width: 100%; max-width: 680px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }

  .q-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: var(--accent, #FF6B6B);
    border-radius: 24px 24px 0 0;
  }

  .q-number { color: var(--sub); font-size: 0.85rem; font-weight: 700; margin-bottom: 0.75rem; letter-spacing: 1px; }
  .q-text { font-size: 1.15rem; font-weight: 700; line-height: 1.5; margin-bottom: 1.8rem; }

  .options-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  @media (max-width: 480px) { .options-grid { grid-template-columns: 1fr; } }

  .opt-btn {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 0.9rem 1rem;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .opt-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.3);
    transform: translateY(-2px);
  }
  .opt-btn.correct { background: rgba(130,224,170,0.25); border-color: #82E0AA; color: #82E0AA; }
  .opt-btn.wrong   { background: rgba(255,107,107,0.2);  border-color: #FF6B6B; color: #FF6B6B; }
  .opt-btn:disabled { cursor: default; }

  .feedback-box {
    margin-top: 1.2rem;
    padding: 1rem 1.2rem;
    border-radius: 14px;
    font-size: 0.95rem; font-weight: 700;
    line-height: 1.5;
    display: none;
  }
  .feedback-box.show { display: block; animation: fadeIn 0.4s ease; }
  .feedback-box.pos { background: rgba(130,224,170,0.15); border: 1px solid #82E0AA; color: #82E0AA; }
  .feedback-box.neg { background: rgba(255,107,107,0.15); border: 1px solid #FF6B6B; color: #FF6B6B; }

  .btn-next {
    margin-top: 1.5rem;
    padding: 0.8rem 2.5rem;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    border: none; border-radius: 50px;
    background: var(--accent, #FF6B6B);
    color: white; cursor: pointer;
    display: none;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    transition: transform 0.15s;
  }
  .btn-next.show { display: inline-block; animation: fadeIn 0.4s ease; }
  .btn-next:hover { transform: translateY(-2px); }

  /* ---- AI THINKING ---- */
  .thinking {
    display: flex; gap: 6px; align-items: center; padding: 1rem 0;
    color: var(--sub); font-size: 0.9rem; font-weight: 700;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sub); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.8);opacity:0.4} 40%{transform:scale(1.2);opacity:1} }

  /* ---- RESULTS SCREEN ---- */
  .result-card {
    background: var(--card); border-radius: 28px; padding: 2.5rem 2rem;
    text-align: center; max-width: 520px; width: 100%;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 25px 70px rgba(0,0,0,0.5);
  }

  .trophy { font-size: 5rem; margin-bottom: 1rem; }
  .final-score { font-family: 'Fredoka One', cursive; font-size: 4rem; }
  .final-label { color: var(--sub); font-size: 1rem; font-weight: 700; margin-bottom: 1.5rem; }
  .level-result { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.5rem; }
  .level-desc { color: var(--sub); font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.5; }

  .btn-play-again {
    padding: 0.9rem 2.5rem;
    font-family: 'Fredoka One', cursive; font-size: 1.2rem;
    border: none; border-radius: 50px;
    background: linear-gradient(135deg, #4ECDC4, #82E0AA);
    color: #0D1B2A; cursor: pointer;
    box-shadow: 0 6px 20px rgba(78,205,196,0.35);
    transition: transform 0.15s;
  }
  .btn-play-again:hover { transform: translateY(-3px); }

  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

  .stars { font-size: 1.8rem; letter-spacing: 6px; margin-bottom: 1rem; }

  /* Floating shapes */
  .shapes { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .shape {
    position: absolute; border-radius: 50%;
    opacity: 0.04;
    animation: float linear infinite;
  }
  @keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); }
    100% { transform: translateY(-120px) rotate(360deg); }
  }

  .screen { position: relative; z-index: 1; }

  .progress-bar {
    width: 100%; max-width: 680px;
    height: 6px; background: rgba(255,255,255,0.08);
    border-radius: 10px; margin-bottom: 1.2rem; overflow: hidden;
  }
  .progress-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease; background: var(--accent,#FF6B6B); }
</style>
</head>
<body>

<!-- Floating BG shapes -->
<div class="shapes">
  <div class="shape" style="width:300px;height:300px;background:#FF6B6B;left:10%;animation-duration:18s;animation-delay:-3s;"></div>
  <div class="shape" style="width:200px;height:200px;background:#4ECDC4;left:60%;animation-duration:22s;animation-delay:-10s;"></div>
  <div class="shape" style="width:150px;height:150px;background:#F7DC6F;left:80%;animation-duration:15s;animation-delay:-6s;"></div>
  <div class="shape" style="width:250px;height:250px;background:#82E0AA;left:35%;animation-duration:25s;animation-delay:-15s;"></div>
</div>

<!-- SCREEN 1: ROLL DIE -->
<div class="screen active" id="screen-roll">
  <h1 class="title">🎲 STEAM Quest</h1>
  <p class="subtitle">Roll the die · Choose your subject · Learn through play!</p>

  <div class="die-arena">
    <div class="die" id="die">
      <div class="face face-front">S<span class="label">SCIENCE</span></div>
      <div class="face face-back">T<span class="label">TECHNOLOGY</span></div>
      <div class="face face-right">E<span class="label">ENGINEERING</span></div>
      <div class="face face-left">A<span class="label">ARTS</span></div>
      <div class="face face-top">M<span class="label">MATHS</span></div>
      <div class="face face-bottom">🔥<span class="label">STEAM</span></div>
    </div>
  </div>

  <button class="btn-roll" id="btnRoll" onclick="rollDie()">🎲 Roll the Die!</button>
  <div class="result-banner" id="resultBanner"></div>
</div>

<!-- SCREEN 2: QUESTION -->
<div class="screen" id="screen-question">
  <h1 class="title">STEAM Quest</h1>

  <div class="q-header" id="qHeader">
    <div class="subject-badge" id="subjectBadge"></div>
    <div class="level-tag" id="levelTag"></div>
    <div class="score-display">⭐ <span id="scoreDisplay">0</span></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <div class="q-card" id="qCard">
    <div class="q-number" id="qNumber"></div>
    <div class="q-text" id="qText">Loading question...</div>
    <div class="options-grid" id="optionsGrid"></div>
    <div class="feedback-box" id="feedbackBox"></div>
    <div style="text-align:center">
      <button class="btn-next" id="btnNext" onclick="nextQuestion()">Next ➜</button>
    </div>
  </div>
</div>

<!-- SCREEN 3: RESULTS -->
<div class="screen" id="screen-result">
  <h1 class="title">Quest Complete!</h1>
  <div class="result-card">
    <div class="trophy" id="trophyEmoji">🏆</div>
    <div class="stars" id="starsDisplay"></div>
    <div class="final-score" id="finalScore"></div>
    <div class="final-label">points earned</div>
    <div class="level-result" id="levelResult"></div>
    <div class="level-desc" id="levelDesc"></div>
    <button class="btn-play-again" onclick="resetGame()">🎲 Play Again!</button>
  </div>
</div>

<script>
const SUBJECTS = {
  S: { name: "Science",     color: "#FF6B6B", emoji: "🔬" },
  T: { name: "Technology",  color: "#4ECDC4", emoji: "💻" },
  E: { name: "Engineering", color: "#F7DC6F", emoji: "⚙️" },
  A: { name: "Arts",        color: "#C39BD3", emoji: "🎨" },
  M: { name: "Mathematics", color: "#82E0AA", emoji: "📐" },
  STEAM: { name: "STEAM Mix", color: "#F0A500", emoji: "🔥" }
};

const DIE_FACES = ["S","T","E","A","M","STEAM"];
const DIE_ROTATIONS = {
  S:     "rotateX(0deg)   rotateY(0deg)",
  T:     "rotateX(0deg)   rotateY(180deg)",
  E:     "rotateX(0deg)   rotateY(-90deg)",
  A:     "rotateX(0deg)   rotateY(90deg)",
  M:     "rotateX(-90deg) rotateY(0deg)",
  STEAM: "rotateX(90deg)  rotateY(0deg)"
};

let state = {
  subject: null,
  score: 0,
  questionIndex: 0,
  totalQuestions: 5,
  learnerLevel: null, // 'beginner' | 'intermediate' | 'advanced'
  questions: [],
  answered: false
};

/* ---- DIE ROLL ---- */
function rollDie() {
  const btn = document.getElementById('btnRoll');
  const die = document.getElementById('die');
  const banner = document.getElementById('resultBanner');
  btn.disabled = true;
  banner.classList.remove('show');
  banner.textContent = '';

  const face = DIE_FACES[Math.floor(Math.random() * 6)];
  die.style.setProperty('--final-rot', DIE_ROTATIONS[face]);
  die.classList.add('rolling');

  setTimeout(() => {
    die.classList.remove('rolling');
    die.style.transform = DIE_ROTATIONS[face];
    const s = SUBJECTS[face];
    banner.textContent = `${s.emoji} You rolled ${s.name}!`;
    banner.style.color = s.color;
    banner.classList.add('show');
    setTimeout(() => startGame(face), 1200);
  }, 1500);
}

/* ---- GAME START ---- */
function startGame(face) {
  state.subject = face;
  state.score = 0;
  state.questionIndex = 0;
  state.learnerLevel = null;
  state.questions = [];
  showScreen('screen-question');
  applySubjectTheme(face);
  fetchQuestion(true); // baseline
}

function applySubjectTheme(face) {
  const s = SUBJECTS[face];
  document.documentElement.style.setProperty('--accent', s.color);
  document.getElementById('subjectBadge').textContent = `${s.emoji} ${s.name}`;
  document.getElementById('subjectBadge').style.background = s.color;
  document.getElementById('subjectBadge').style.color = '#0D1B2A';
}

/* ---- FETCH QUESTION FROM CLAUDE API ---- */
async function fetchQuestion(isBaseline) {
  showThinking();

  const s = SUBJECTS[state.subject];
  const levelHint = isBaseline ? "baseline (could be beginner, intermediate, or advanced)" 
    : `${state.learnerLevel} level`;

  // Build a full history block so the AI knows EXACTLY what was already asked
  const askedBlock = state.questions.length
    ? `\n\nQUESTIONS ALREADY ASKED (DO NOT repeat, rephrase, or ask about the same concept):\n` +
      state.questions.map((q, i) => `${i+1}. [Topic: ${q.topic}] "${q.question}"`).join('\n')
    : '';

  // Build a broad list of possible topics so the AI picks a FRESH one
  const topicsUsed = state.questions.map(q => q.topic).filter(Boolean);
  const avoidTopics = topicsUsed.length 
    ? `\nTopics already covered (pick something DIFFERENT): ${topicsUsed.join(', ')}` 
    : '';

  const prompt = `You are a friendly STEM educator for Nigerian secondary school students (ages 10-16) in underserved communities.

Generate ONE ${isBaseline ? 'BASELINE' : levelHint} multiple-choice question about ${s.name}.
${isBaseline ? 'The baseline question should be moderately challenging — not too easy, not too hard — to accurately gauge the student\'s level.' : `Difficulty: ${state.learnerLevel}. Make it appropriate for that level.`}
${avoidTopics}
${askedBlock}

STRICT RULES:
1. The question MUST be on a completely NEW topic not listed above.
2. Do NOT rephrase, reword, or ask about the same concept as any previous question.
3. Do NOT repeat any answer options or correct answers from previous questions.
4. Each question must test a different skill or concept within ${s.name}.
5. Make the question clear, engaging and relatable to a Nigerian student's everyday life where possible.
6. Vary the question style: sometimes ask for definitions, sometimes calculations, sometimes real-world application, sometimes "which of these is true/false".

Return ONLY valid JSON (no markdown, no backticks, no explanation — just the raw JSON object):
{
  "question": "...",
  "options": ["A. ...", "B. ...", "C. ...", "D. ..."],
  "correct": "A",
  "explanation": "Brief, encouraging explanation (1-2 sentences). Mention WHY the correct answer is right.",
  "topic": "specific topic name (e.g. 'photosynthesis', 'algebra', 'circuits')",
  "difficulty": "beginner|intermediate|advanced"
}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    let text = data.content.map(b => b.text || '').join('');
    text = text.replace(/```json|```/g, '').trim();
    const q = JSON.parse(text);
    state.questions.push(q);
    if (isBaseline) state.learnerLevel = q.difficulty;
    renderQuestion(q, isBaseline);
  } catch(e) {
    // Fallback — pick one not already used
    const usedTopics = state.questions.map(q => q.topic);
    const fallback = getFallback(state.subject, isBaseline ? 'intermediate' : state.learnerLevel, usedTopics);
    state.questions.push(fallback);
    if (isBaseline) state.learnerLevel = fallback.difficulty;
    renderQuestion(fallback, isBaseline);
  }
}

/* ---- RENDER QUESTION ---- */
function renderQuestion(q, isBaseline) {
  state.answered = false;
  const total = state.totalQuestions;
  const idx = state.questionIndex;

  document.getElementById('qNumber').textContent = isBaseline 
    ? `🎯 Warm-up Question · Let's see what you know!`
    : `Question ${idx + 1} of ${total}`;

  document.getElementById('levelTag').textContent = isBaseline ? 'Baseline' : `Level: ${capitalize(state.learnerLevel)}`;
  document.getElementById('scoreDisplay').textContent = state.score;
  document.getElementById('qText').textContent = q.question;
  document.getElementById('progressFill').style.width = `${(idx / total) * 100}%`;

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(opt[0], q, btn);
    grid.appendChild(btn);
  });

  document.getElementById('feedbackBox').className = 'feedback-box';
  document.getElementById('feedbackBox').textContent = '';
  document.getElementById('btnNext').className = 'btn-next';
  document.getElementById('qCard').style.opacity = '0';
  document.getElementById('qCard').style.transform = 'translateY(16px)';
  setTimeout(() => {
    document.getElementById('qCard').style.transition = 'all 0.4s ease';
    document.getElementById('qCard').style.opacity = '1';
    document.getElementById('qCard').style.transform = 'none';
  }, 50);
}

/* ---- ANSWER CHECK ---- */
function checkAnswer(chosen, q, clickedBtn) {
  if (state.answered) return;
  state.answered = true;

  const correct = chosen === q.correct;
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent.startsWith(q.correct)) b.classList.add('correct');
  });
  if (!correct) clickedBtn.classList.add('wrong');

  const fb = document.getElementById('feedbackBox');
  if (correct) {
    const pts = state.learnerLevel === 'advanced' ? 30 : state.learnerLevel === 'intermediate' ? 20 : 10;
    state.score += pts;
    fb.className = 'feedback-box pos show';
    fb.textContent = `✅ Correct! +${pts} points — ${q.explanation}`;
  } else {
    fb.className = 'feedback-box neg show';
    fb.textContent = `❌ Not quite! The answer is ${q.correct}. ${q.explanation}`;
    // Adjust level down if baseline
    if (state.questionIndex === 0 && state.learnerLevel !== 'beginner') {
      const levels = ['beginner','intermediate','advanced'];
      const idx = levels.indexOf(state.learnerLevel);
      if (idx > 0) state.learnerLevel = levels[idx-1];
    }
  }

  document.getElementById('scoreDisplay').textContent = state.score;
  document.getElementById('btnNext').className = 'btn-next show';
  document.getElementById('btnNext').textContent = 
    state.questionIndex >= state.totalQuestions - 1 ? 'See Results 🏆' : 'Next ➜';
}

/* ---- NEXT QUESTION ---- */
function nextQuestion() {
  state.questionIndex++;
  if (state.questionIndex >= state.totalQuestions) {
    showResults();
  } else {
    fetchQuestion(false);
  }
}

/* ---- RESULTS ---- */
function showResults() {
  showScreen('screen-result');
  const max = state.totalQuestions * 30;
  const pct = state.score / max;
  let trophy, stars, levelRes, desc;

  if (pct >= 0.8) {
    trophy='🏆'; stars='⭐⭐⭐'; levelRes='STEAM Champion! 🔥'; 
    desc='Outstanding! You have a strong grasp of this subject. Keep pushing your curiosity and explore deeper concepts!';
  } else if (pct >= 0.5) {
    trophy='🎖️'; stars='⭐⭐'; levelRes='Great Explorer! 🚀'; 
    desc='Well done! You\'re building solid foundations. A little more practice will take you to the top!';
  } else {
    trophy='🌱'; stars='⭐'; levelRes='Rising Learner! 💪'; 
    desc='Every expert was once a beginner. Review the topics and try again — you\'ve got this!';
  }

  document.getElementById('trophyEmoji').textContent = trophy;
  document.getElementById('starsDisplay').textContent = stars;
  document.getElementById('finalScore').textContent = state.score;
  document.getElementById('finalScore').style.color = SUBJECTS[state.subject].color;
  document.getElementById('levelResult').textContent = levelRes;
  document.getElementById('levelDesc').textContent = desc;
}

/* ---- HELPERS ---- */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showThinking() {
  document.getElementById('qText').innerHTML = `<div class="thinking"><span>🤖 AI is crafting your question</span><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  document.getElementById('optionsGrid').innerHTML = '';
  document.getElementById('feedbackBox').className = 'feedback-box';
  document.getElementById('btnNext').className = 'btn-next';
}

function capitalize(s) { return s ? s[0].toUpperCase() + s.slice(1) : ''; }

function resetGame() {
  state = { subject:null, score:0, questionIndex:0, totalQuestions:5, learnerLevel:null, questions:[], answered:false };
  document.getElementById('die').style.transform = '';
  document.getElementById('btnRoll').disabled = false;
  document.getElementById('resultBanner').classList.remove('show');
  showScreen('screen-roll');
}
